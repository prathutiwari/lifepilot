info:
  name: Process Message
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5000/api/v1/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "message": "I studied Node.js for 2 hours and spent ₹450 on groceries"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
